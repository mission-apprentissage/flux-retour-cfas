name: CI

on:
  workflow_call:
jobs:
  npm-packages-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Analyze NPM dependancies
        uses: ./.github/actions/npm-check

  lint:
    if: ${{ success() }}
    needs: ["npm-packages-check"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Make sure to use same dependencies version across all packages
        run: yarn dedupe --check

      - name: lint
        run: yarn lint:node

      - name: prettier
        run: yarn prettier:check

  typecheck:
    if: ${{ success() }}
    needs: ["npm-packages-check"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: typecheck
        run: yarn typecheck:ci

  test-node:
    if: ${{ success() }}
    needs: ["npm-packages-check"]
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - "27017:27017"
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: test
        run: yarn test:ci:node

  # Commandes exécutées en direct (sans yarn, qui exige un install node) :
  # miroir des scripts classifier:install / lint:classifier / test:ci:classifier
  test-classifier:
    if: ${{ success() }}
    needs: ["npm-packages-check"]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-classifier
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server-classifier/requirements*.txt

      - name: Install classifier dependencies
        run: python3 -m venv .venv && .venv/bin/pip install -r requirements-dev.txt

      - name: lint classifier
        run: .venv/bin/ruff check . && .venv/bin/ruff format --check .

      - name: test classifier
        run: .venv/bin/pytest -v
