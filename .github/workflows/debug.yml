name: DEBUG
on: [push]
jobs:
  server:
    if: false # DEBUG
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/mission-apprentissage/tdb-server
      CONTEXT_PATH: server
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - run: |
          echo $GITHUB_SHA
          echo $GITHUB_REF_NAME
          echo $IMAGE_NAME
          echo ${{ env.IMAGE_NAME }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4.5.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: type=sha,prefix=,format=long

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4.1.0
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - run: |
          docker tag $IMAGE_NAME:$GITHUB_SHA $IMAGE_NAME:$GITHUB_REF_NAME-test
          docker push $IMAGE_NAME:$GITHUB_REF_NAME-test
          docker images

      - name: Build and push Docker image
        uses: docker/build-push-action@v4.1.0
        with:
          context: ${{ env.CONTEXT_PATH }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
