# Override containers for local / dev environnement
version: "2.4"
services:
  reverse_proxy:
    volumes:
      - tableau_de_bord_nginx_data:/data

  ui:
    stdin_open: true
    build:
      context: ui
      dockerfile: Dockerfile.dev
    volumes:
      - ./ui:/app #Allows source folders to be watched
      - "/app/node_modules"
    environment:
      - CHOKIDAR_USEPOLLING=true

  server:
    command: ["yarn", "debug"]
    ports:
      - "127.0.0.1:9229:9229" # Allows remote debugging
    volumes:
      - ./server/src:/app/src # Allows source folders to be watched
      - ./server/config:/app/config
      - tableau_de_bord_ftp_data:/ftp
      - tableau_de_bord_server_data:/data
    build:
      args:
        - NPM_TOKEN=local
    environment:
      - TABLEAU_DE_BORD_ENV=local
      - TABLEAU_DE_BORD_APP_NAME=Flux Retour Cfas
      # logs
      - TABLEAU_DE_BORD_LOG_LEVEL=debug
      - TABLEAU_DE_BORD_OUTPUT_DIR=.local/output
      - TABLEAU_DE_BORD_PUBLIC_URL=http://localhost
      # auth
      - TABLEAU_DE_BORD_AUTH_USER_JWT_SECRET=1234
      - TABLEAU_DE_BORD_AUTH_ACTIVATION_JWT_SECRET=456
      - TABLEAU_DE_BORD_AUTH_PASSWORD_JWT_SECRET=789
      # users
      ## ymag
      - TABLEAU_DE_BORD_USERS_YMAG_NAME=ymag
      - TABLEAU_DE_BORD_USERS_YMAG_PASSWORD=mdpYmag
      - TABLEAU_DE_BORD_USERS_YMAG_PERMISSIONS=apiStatutsSeeder
        ## gesti
      - TABLEAU_DE_BORD_USERS_GESTI_NAME=gesti
      - TABLEAU_DE_BORD_USERS_GESTI_PASSWORD=mdpGesti
      - TABLEAU_DE_BORD_USERS_GESTI_PERMISSIONS=apiStatutsSeeder,ftpAccess
        ## sc form
      - TABLEAU_DE_BORD_USERS_SCFORM_NAME=scform
      - TABLEAU_DE_BORD_USERS_SCFORM_PASSWORD=mdpScform
      - TABLEAU_DE_BORD_USERS_SCFORM_PERMISSIONS=apiStatutsSeeder
        ## fca manager
      - TABLEAU_DE_BORD_USERS_FCA_MANAGER_NAME=fcamanager
      - TABLEAU_DE_BORD_USERS_FCA_MANAGER_PASSWORD=mdpFcaManager
      - TABLEAU_DE_BORD_USERS_FCA_MANAGER_PERMISSIONS=apiStatutsSeeder
        ## admin
      - TABLEAU_DE_BORD_USERS_DEFAULT_ADMIN_NAME=mna-admin
      - TABLEAU_DE_BORD_USERS_DEFAULT_ADMIN_PASSWORD=password
      - TABLEAU_DE_BORD_USERS_DEFAULT_ADMIN_PERMISSIONS=administrator,ftpAccess
      # Tables Correspondance
      - TABLEAU_DE_BORD_TABLES_CORRESPONDANCES_ENDPOINT_URL=https://tables-correspondances.apprentissage.beta.gouv.fr/api
      # Mna Catalog
      - TABLEAU_DE_BORD_MNA_CATALOG_ENDPOINT_URL=https://catalogue.apprentissage.beta.gouv.fr/api
      # LBA
      - TABLEAU_DE_BORD_LBA_ENDPOINT_URL=http://labonnealternance.apprentissage.beta.gouv.fr/api
      # OVH Storage
      - TABLEAU_DE_BORD_OVH_STORAGE_USERNAME=user-OvhStorage
      - TABLEAU_DE_BORD_OVH_STORAGE_PASSWORD=ovhStoragePass
      - TABLEAU_DE_BORD_OVH_STORAGE_AUTH_URL=https://auth.cloud.ovh.net/v3/auth
      - TABLEAU_DE_BORD_OVH_STORAGE_TENANT_ID=12345
      - TABLEAU_DE_BORD_OVH_STORAGE_REGION=XXX
      - TABLEAU_DE_BORD_OVH_STORAGE_CONTAINER_NAME=container-name

  mongodb:
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - tableau_de_bord_mongodb_data:/data

  ftp:
    volumes:
      - tableau_de_bord_ftp_data:/data

volumes:
  tableau_de_bord_mongodb_data:
    driver: local
    name: tableau_de_bord_mongodb_data
  tableau_de_bord_nginx_data:
    driver: local
    name: tableau_de_bord_nginx_data
  tableau_de_bord_server_data:
    driver: local
    name: tableau_de_bord_server_data
  tableau_de_bord_ftp_data:
    driver: local
    name: tableau_de_bord_ftp_data
